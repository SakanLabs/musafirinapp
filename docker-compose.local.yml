version: '3.8'

services:
  # Local Database
  db:
    image: postgres:15-alpine
    container_name: musafirin_local_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: musdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

  # Local MinIO for Object Storage
  minio:
    image: minio/minio:latest
    container_name: musafirin_local_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_DEFAULT_BUCKETS: musafirin-assets
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_local_data:/data

volumes:
  postgres_local_data:
  minio_local_data:
